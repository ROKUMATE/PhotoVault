services:
  postgres:
    image: postgres:16-alpine
    container_name: photovault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: photovault
      POSTGRES_PASSWORD: photovault
      POSTGRES_DB: photovault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: photovault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: photovault-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://photovault:photovault@postgres:5432/photovault
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
      - PORT=3001
      # Note: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, SESSION_SECRET, ENCRYPTION_KEY should be passed here or set in .env
    env_file:
      - .env

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: photovault-client
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
